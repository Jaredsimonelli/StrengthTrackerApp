<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#1d5f63">
    <title>Two Day Strength Tracker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Local strength log</p>
        <h1>Two Day Strength</h1>
      </div>
      <button class="icon-button" id="installButton" type="button" title="Install app" hidden>+</button>
    </header>

    <main>
      <section class="control-band">
        <div class="week-stepper" aria-label="Workout week">
          <span>Week</span>
          <div class="week-stepper-control">
            <button id="previousWeekButton" type="button" aria-label="Previous week">‹</button>
            <strong id="weekLabel">1</strong>
            <button id="nextWeekButton" type="button" aria-label="Next week">›</button>
          </div>
        </div>
        <div class="segmented" role="tablist" aria-label="Workout day">
          <button id="day1Button" type="button">Day 1</button>
          <button id="day2Button" type="button">Day 2</button>
        </div>
      </section>

      <section class="today-panel">
        <div>
          <p id="phaseLabel" class="eyebrow">Week 1</p>
          <h2 id="workoutTitle">Day 1</h2>
        </div>
        <p id="phaseNote"></p>
      </section>

      <section id="exerciseList" class="exercise-list" aria-live="polite"></section>

      <section class="custom-tools" aria-label="Custom lift tools">
        <button id="addCustomButton" type="button">+ Add Lift</button>
        <button id="copyPreviousButton" type="button">Copy Last Week</button>
        <p id="customStatus" aria-live="polite"></p>
      </section>

      <section id="customFormCard" class="exercise-card custom-form-card" hidden>
        <div class="exercise-head custom-form-head">
          <span>
            <strong>Add lift</strong>
            <small>Saved to this week and day only</small>
          </span>
        </div>
        <div class="custom-form-grid">
          <label>
            Type
            <select id="customCategory">
              <option value="accessory">Accessory</option>
              <option value="lift">Lift</option>
            </select>
          </label>
          <label class="custom-name-field">
            Lift name
            <input id="customName" type="text" placeholder="Incline dumbbell press">
          </label>
          <div class="custom-set-builder">
            <div class="custom-set-builder-head">
              <strong>Planned sets</strong>
              <button id="addCustomSetButton" type="button">+ Set</button>
            </div>
            <div id="customSetRows" class="custom-set-rows"></div>
          </div>
        </div>
        <div class="custom-form-actions">
          <button id="saveCustomButton" type="button">Add Lift</button>
          <button id="cancelCustomButton" type="button">Cancel</button>
        </div>
      </section>

      <section class="summary-grid">
        <div>
          <span id="prCount">0</span>
          <p>Submitted</p>
        </div>
        <div>
          <span id="completeCount">0</span>
          <p>Sets listed</p>
        </div>
      </section>

      <section class="submit-band">
        <button id="submitWorkoutButton" type="button">Submit Workout</button>
      </section>

      <section class="clear-today-band">
        <button id="clearDataButton" type="button">Clear Today's Data</button>
      </section>

      <section class="plain-section">
        <h2>Weeks</h2>
        <div id="historyList" class="history-list"></div>
      </section>

      <section class="plain-section data-section">
        <details>
          <summary>Data</summary>
          <div class="data-actions">
            <button id="exportDataButton" type="button">Backup Data</button>
            <button id="importDataButton" type="button">Restore Data</button>
          </div>
          <p id="dataStatus" class="data-status" aria-live="polite"></p>
        </details>
      </section>
    </main>

    <template id="exerciseTemplate">
      <article class="exercise-card">
        <button class="exercise-head" type="button">
          <span>
            <strong class="exercise-name"></strong>
            <small class="exercise-prescription"></small>
          </span>
        </button>
        <div class="sets"></div>
      </article>
    </template>

    <dialog id="deleteCustomDialog" class="confirm-dialog">
      <form method="dialog">
        <h2>Remove lift?</h2>
        <p id="deleteCustomMessage">This removes the lift from this week only.</p>
        <div class="dialog-actions">
          <button id="cancelDeleteButton" value="cancel" type="submit">Cancel</button>
          <button id="confirmDeleteButton" value="delete" type="submit">Delete</button>
        </div>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
